<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Projects</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 40px;
        font-family: Arial, sans-serif;
        background: #ffffff;
        color: #000000;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 100%;
        max-width: 1200px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2rem;
        letter-spacing: 2px;
        color: #000;
    }

    .grid {
        display: grid;
        gap: 30px;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    }

    .card {
        background: #ffffff;
        border-radius: 14px;
        padding: 18px;
        border: 1px solid #ccc;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .card h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
        color: #333;
        letter-spacing: 1px;
    }

    .img-box {
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #ddd;
        background: #fff;
        position: relative;
    }

    .img-box img {
        width: 100%;
        display: block;
        object-fit: cover;
    }


    .butterfly-effect img {
        filter: invert(100%);
        border-top-left-radius: 40px;
        border-bottom-right-radius: 40px;
    }


    .football-wrapper {
        position: relative;
        width: 80%;
        margin: 0 auto;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 12px;

        border: 14px solid transparent;
        border-image-source: url("tic-tac-toe.png");
        border-image-slice: 30%;
        border-image-width: 14px;
        border-image-repeat: round;
    }

.field {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%); 
}



    .dino-effect img {
        filter: invert(100%);
    }



.penguin-effect {
    background: #ffffff; 
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.penguin-oval {
    width: 90%;
    aspect-ratio: 4 / 3;
    background: #f7f7f0;    
    border-radius: 50%;       
    border: 4px solid black;  
    overflow: hidden;         
    display: flex;
    justify-content: center;
    align-items: center;
}

.penguin-oval img {
    width: 100%;
    height: auto;
    object-fit: cover;
}




    .seagull-effect {
        position: relative;
        overflow: hidden;
        background: linear-gradient(to bottom right, #4a8cff, #ffffff);
    }

    .seagull-effect img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
    }



    .theater-effect {
        position: relative;
        overflow: hidden;
    }

    .theater-effect img {
        width: 100%;
        filter: blur(6px);
        transform: scale(1.1);
    }

    .theater-effect::after {
        content: "Presenting";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 18px;
        font-weight: bold;
        z-index: 2;
    }

</style>
</head>

<body>
<div class="container">

    <h1>The Imitation Assignment</h1>

    <div class="grid">

        <!-- BUTTERFLY -->
        <div class="card">
            <h2>Butterfly Project</h2>
            <div class="img-box butterfly-effect">
                <img src="butterfly.jpg" alt="Butterfly">
            </div>
        </div>

        <!-- FOOTBALL FIELD -->
        <div class="card">
            <h2>Football Field + Tic Tac Toe</h2>
            <div class="football-wrapper">
                <img class="field" src="football_field.jpg" alt="Football Field">
            </div>
        </div>

        <!-- DINOSAUR -->
        <div class="card">
            <h2>Dinosaur Project</h2>
            <div class="img-box dino-effect">
                <img src="dinosaur.png" alt="Dinosaur">
            </div>
        </div>

        <!-- PENGUINS -->
        <div class="card">
            <h2>Penguins Project</h2>
            <div class="img-box penguin-effect">
                <div class="penguin-oval">
                    <img src="penguins.jpg" alt="Penguins">
                </div>
            </div>
        </div>



        <!-- SEAGULL -->
        <div class="card">
            <h2>Seagull Project</h2>
            <div class="img-box seagull-effect">
                <img src="seagull.png" alt="Seagull">
            </div>
        </div>

        <!-- THEATER -->
        <div class="card">
            <h2>Theater Stage Project</h2>
            <div class="img-box theater-effect">
                <img src="theater_stage.jpg" alt="Theater Stage">
            </div>
        </div>

    </div>
</div>
</body>
</html>
